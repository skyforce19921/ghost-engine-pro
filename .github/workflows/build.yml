name: Build Ghost Engine PRO APK
on:
  workflow_dispatch: 

jobs:
  build-android:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: ${{ runner.os }}-buildozer-v6-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-v6-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install System Dependencies
        run: |
          for i in {1..5}; do sudo apt-get update && break || sleep 15; done
          sudo apt-get install -y git zip unzip libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev autoconf

      - name: Install Buildozer
        run: |
          pip install buildozer cython==0.29.36 virtualenv setuptools

      - name: Compile APK
        run: |
          export APP_ANDROID_ACCEPT_SDK_LICENSE=True
          
          # 1. First pass to fetch recipes (ignore failure)
          buildozer android debug || true
          
          # 2. Surgical global fix for Cython 3 compatibility
          python3 -c "
          import re
          import os
          # Refined patterns to fix Cython 3 errors with extreme precision
          replacements = [
              (re.compile(r'isinstance\(([^,]+),\s*long\)'), r'isinstance(\1, int)'),
              (re.compile(r'isinstance\(([^,]+),\s*\(int,\s*long\)\)'), r'isinstance(\1, (int, int))'),
              (re.compile(r'def\s+__long__\(self\):'), r'def __int__(self):'),
              (re.compile(r'return\s+long\(([^)]+)\)'), r'return int(\1)'),
              (re.compile(r'long:\s*\'J\''), r'int: \'J\''),
              (re.compile(r'long:\s*\'Ljava/lang/Long;\''), r'int: \'Ljava/lang/Long;\''),
          ]
          
          print('--- INITIATING GLOBAL CYTHON 3 SURGICAL PATCH ---')
          count = 0
          for root, dirs, files in os.walk('.buildozer'):
              for file in files:
                  if file.endswith(('.pxi', '.pyx', '.pxd')):
                      f_path = os.path.join(root, file)
                      try:
                          with open(f_path, 'r') as f:
                              content = f.read()
                          
                          new_content = content
                          for pattern, repl in replacements:
                              new_content = pattern.sub(repl, new_content)
                          
                          if new_content != content:
                              with open(f_path, 'w') as f:
                                  f.write(new_content)
                              count += 1
                      except:
                          pass
          print(f'--- PATCHING COMPLETE: {count} FILES FIXED ---')
          "
          
          # 3. Final definitive build
          buildozer android debug

      - name: Upload APK for Download
        uses: actions/upload-artifact@v4
        with:
          name: Ghost-Engine-PRO
          path: bin/*.apk
